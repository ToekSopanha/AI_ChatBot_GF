<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Mia — AI Companion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a12;
    --surface: #16111f;
    --surface2: #1e1729;
    --border: rgba(255,255,255,0.07);
    --pink: #f472b6;
    --pink2: #ec4899;
    --purple: #a855f7;
    --lavender: #c084fc;
    --text: #f0e6ff;
    --muted: #8b7aa0;
    --bubble-mia: linear-gradient(135deg, #2d1f3d, #1e1729);
    --bubble-user: linear-gradient(135deg, #4a1942, #2d1040);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(168,85,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 80%, rgba(244,114,182,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 1;
    padding: 24px 20px;
    gap: 20px;
    overflow-y: auto;
  }

  .mia-avatar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .avatar-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    box-shadow: 0 0 30px rgba(244,114,182,0.3);
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(244,114,182,0.3); }
    50% { box-shadow: 0 0 40px rgba(244,114,182,0.6); }
  }

  .mia-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    background: linear-gradient(135deg, var(--pink), var(--lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .online-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Relationship card */
  .rel-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
  }

  .rel-label {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
  }

  .rel-level {
    font-size: 15px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }

  .rel-bar-bg {
    height: 4px; background: rgba(255,255,255,0.08);
    border-radius: 2px; margin-top: 10px; overflow: hidden;
  }

  .rel-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--purple));
    border-radius: 2px;
    transition: width 1s ease;
  }

  /* Mood card */
  .mood-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
  }

  .mood-display {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px;
  }

  .mood-emoji { font-size: 22px; }

  /* Voice selector */
  .voice-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
  }

  .section-label {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .voice-option {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    cursor: pointer; transition: background 0.2s;
    font-size: 13px;
  }

  .voice-option:hover { background: rgba(255,255,255,0.05); }
  .voice-option.active { background: rgba(244,114,182,0.15); }
  .voice-option .vdot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
  }
  .voice-option.active .vdot { background: var(--pink); }

  /* Memory card */
  .memory-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    flex: 1;
  }

  .memory-list {
    display: flex; flex-direction: column; gap: 4px;
    max-height: 150px; overflow-y: auto;
  }

  .memory-item {
    font-size: 12px; color: var(--muted);
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  /* ── Main Chat Area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    z-index: 1;
    min-width: 0;
  }

  .chat-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chat-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  .header-actions { display: flex; gap: 10px; }

  .btn-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }

  .btn-icon:hover { color: var(--pink); border-color: rgba(244,114,182,0.3); }
  .btn-icon.active { color: var(--pink); background: rgba(244,114,182,0.1); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .msg-row {
    display: flex;
    gap: 12px;
    animation: slide-in 0.3s ease;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    align-self: flex-end;
  }

  .msg-avatar.mia {
    background: linear-gradient(135deg, var(--pink), var(--purple));
  }

  .msg-avatar.user {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
  }

  .bubble {
    max-width: 68%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.6;
    position: relative;
  }

  .bubble.mia {
    background: var(--bubble-mia);
    border: 1px solid rgba(168,85,247,0.15);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--bubble-user);
    border: 1px solid rgba(244,114,182,0.15);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .bubble-meta {
    display: flex; align-items: center; gap: 6px;
    margin-top: 5px;
  }

  .bubble-time {
    font-size: 11px; color: var(--muted);
  }

  .mood-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
  }

  /* Typing indicator */
  .typing-row { display: none; }
  .typing-row.show { display: flex; }

  .typing-bubble {
    background: var(--bubble-mia);
    border: 1px solid rgba(168,85,247,0.15);
    border-radius: 18px; border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex; gap: 5px; align-items: center;
  }

  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--lavender);
    animation: typing-bounce 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing-bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Input Area ── */
  .input-area {
    padding: 20px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: rgba(244,114,182,0.4);
  }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    line-height: 1.5;
  }

  #msg-input::placeholder { color: var(--muted); }

  .btn-send {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--pink2), var(--purple));
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 15px rgba(244,114,182,0.3);
  }

  .btn-send:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(244,114,182,0.4); }
  .btn-send:active { transform: translateY(0); }

  /* Mic button */
  #mic-btn { font-size: 18px; }
  #mic-btn.listening {
    color: var(--pink);
    animation: pulse-mic 1s ease-in-out infinite;
  }

  @keyframes pulse-mic {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 10px;
    font-size: 13px; z-index: 1000;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; }

  /* Rel level up toast */
  .levelup-toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: linear-gradient(135deg, #2d1f3d, #1e1729);
    border: 1px solid rgba(244,114,182,0.4);
    border-radius: 20px;
    padding: 28px 40px;
    text-align: center;
    z-index: 1000;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }

  .levelup-toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .levelup-emoji { font-size: 48px; }
  .levelup-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin: 10px 0 5px;
    background: linear-gradient(135deg, var(--pink), var(--lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .levelup-sub { font-size: 13px; color: var(--muted); }

  /* Welcome */
  .welcome {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 10px;
    padding: 60px 20px;
    color: var(--muted);
  }

  .welcome-emoji { font-size: 48px; }
  .welcome h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    background: linear-gradient(135deg, var(--pink), var(--lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome p { font-size: 14px; }

  /* scrollbar for sidebar */
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <!-- Avatar -->
  <div class="mia-avatar">
    <div class="avatar-ring">💕</div>
    <div class="mia-name">Mia</div>
    <div class="online-dot"><div class="dot"></div> Online</div>
  </div>

  <!-- Relationship -->
  <div class="rel-card">
    <div class="rel-label">Relationship</div>
    <div class="rel-level" id="rel-level">👋 Strangers</div>
    <div class="rel-bar-bg">
      <div class="rel-bar" id="rel-bar" style="width: 0%"></div>
    </div>
  </div>

  <!-- Mood -->
  <div class="mood-card">
    <div class="rel-label">Your Mood</div>
    <div class="mood-display">
      <div class="mood-emoji" id="mood-emoji">😐</div>
      <div id="mood-text">Neutral</div>
    </div>
  </div>

  <!-- Voice -->
  <div class="voice-card">
    <div class="section-label">Mia's Voice</div>
    <div id="voice-list"></div>
  </div>

  <!-- Memory -->
  <div class="memory-card">
    <div class="section-label">What Mia Remembers</div>
    <div class="memory-list" id="memory-list">
      <div class="memory-item" style="color: var(--muted); font-style: italic;">Nothing yet...</div>
    </div>
  </div>
</div>

<!-- Chat -->
<div class="chat-area">
  <div class="chat-header">
    <h1>💕 Chat with Mia</h1>
    <div class="header-actions">
      <button class="btn-icon active" id="voice-toggle" title="Toggle voice output">🔊</button>
      <button class="btn-icon" id="clear-btn" title="Clear chat">🗑️</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-emoji">💕</div>
      <h2>Hey there!</h2>
      <p>Say something to start chatting with Mia</p>
    </div>

    <!-- Typing indicator -->
    <div class="msg-row typing-row" id="typing-row">
      <div class="msg-avatar mia">💕</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msg-input" placeholder="Say something to Mia..." rows="1"></textarea>
      <button class="btn-icon" id="mic-btn" title="Hold to speak">🎤</button>
    </div>
    <button class="btn-send" id="send-btn">➤</button>
  </div>
</div>

<!-- Toasts -->
<div class="toast" id="toast"></div>
<div class="levelup-toast" id="levelup-toast">
  <div class="levelup-emoji" id="lu-emoji">💕</div>
  <div class="levelup-title" id="lu-title">Relationship Level Up!</div>
  <div class="levelup-sub" id="lu-sub">You're getting closer 🥰</div>
</div>

<script>
const API = "http://localhost:7860/api";
let voiceEnabled = true;
let currentVoice = "rachel";
let lastRelLevel = 0;
let recognition = null;
let isListening = false;

const MOOD_MAP = {
  happy:   {emoji: "😊", label: "Happy"},
  sad:     {emoji: "😢", label: "Sad"},
  angry:   {emoji: "😠", label: "Frustrated"},
  anxious: {emoji: "😰", label: "Anxious"},
  tired:   {emoji: "😴", label: "Tired"},
  flirty:  {emoji: "😘", label: "Flirty"},
  neutral: {emoji: "😐", label: "Neutral"},
};

// ── Init ──
async function init() {
  try {
    const res = await fetch(`${API}/status`);
    const data = await res.json();

    // Voices
    const vList = document.getElementById("voice-list");
    vList.innerHTML = "";
    Object.entries(data.voices).forEach(([key, v]) => {
      const el = document.createElement("div");
      el.className = "voice-option" + (key === data.current_voice ? " active" : "");
      el.dataset.key = key;
      el.innerHTML = `<div class="vdot"></div><div><div style="font-size:13px">${v.name}</div><div style="font-size:11px;color:var(--muted)">${v.desc}</div></div>`;
      el.onclick = () => setVoice(key);
      vList.appendChild(el);
    });
    currentVoice = data.current_voice;

    // Relationship
    updateRelUI(data.relationship);
    lastRelLevel = data.relationship.level;

    // Memory
    updateMemoryUI(data.memory);

    if (!data.el_available) {
      document.getElementById("voice-toggle").title = "ElevenLabs not configured";
      voiceEnabled = false;
      document.getElementById("voice-toggle").classList.remove("active");
    }
  } catch(e) {
    showToast("⚠️ Can't connect to Mia — is the server running?");
  }
}

// ── Voice ──
async function setVoice(key) {
  await fetch(`${API}/set_voice`, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({voice: key})
  });
  currentVoice = key;
  document.querySelectorAll(".voice-option").forEach(el => {
    el.classList.toggle("active", el.dataset.key === key);
  });
}

// ── Send Message ──
async function sendMessage() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text) return;

  document.getElementById("welcome")?.remove();
  input.value = "";
  input.style.height = "22px";

  addBubble("user", text, null);
  showTyping(true);

  try {
    const res = await fetch(`${API}/chat`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: text, voice_enabled: voiceEnabled})
    });
    const data = await res.json();

    showTyping(false);

    if (data.error) {
      addBubble("mia", "Oops, something went wrong 😕 Try again?", null);
      return;
    }

    addBubble("mia", data.reply, data.mood);

    // Play audio if available
    if (data.audio) playAudio(data.audio);

    // Update mood
    if (data.mood && MOOD_MAP[data.mood]) {
      document.getElementById("mood-emoji").textContent = MOOD_MAP[data.mood].emoji;
      document.getElementById("mood-text").textContent = MOOD_MAP[data.mood].label;
    }

    // Update relationship
    if (data.relationship) {
      updateRelUI(data.relationship);
      if (data.relationship.level > lastRelLevel) {
        showLevelUp(data.relationship);
        lastRelLevel = data.relationship.level;
      }
    }

    // Refresh memory
    refreshMemory();

  } catch(e) {
    showTyping(false);
    addBubble("mia", "Connection issue 😕 Is the server still running?", null);
  }
}

// ── UI Helpers ──
function addBubble(who, text, mood) {
  const msgs = document.getElementById("messages");
  const typing = document.getElementById("typing-row");

  const row = document.createElement("div");
  row.className = `msg-row ${who}`;

  const avatar = document.createElement("div");
  avatar.className = `msg-avatar ${who}`;
  avatar.textContent = who === "mia" ? "💕" : "😊";

  const bubble = document.createElement("div");
  bubble.className = `bubble ${who}`;
  bubble.textContent = text;

  const meta = document.createElement("div");
  meta.className = "bubble-meta";
  const time = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  meta.innerHTML = `<span class="bubble-time">${time}</span>`;
  if (mood && mood !== "neutral" && who === "user") {
    meta.innerHTML += `<span class="mood-tag">${MOOD_MAP[mood]?.emoji || ""} ${mood}</span>`;
  }

  bubble.appendChild(meta);
  row.appendChild(avatar);
  row.appendChild(bubble);
  msgs.insertBefore(row, typing);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(show) {
  document.getElementById("typing-row").classList.toggle("show", show);
  const msgs = document.getElementById("messages");
  msgs.scrollTop = msgs.scrollHeight;
}

function updateRelUI(rel) {
  document.getElementById("rel-level").textContent = `${rel.emoji} ${rel.name}`;
  const maxScore = 150;
  const pct = Math.min((rel.score / maxScore) * 100, 100);
  document.getElementById("rel-bar").style.width = pct + "%";
}

async function refreshMemory() {
  try {
    const res = await fetch(`${API}/memory`);
    const mem = await res.json();
    updateMemoryUI(mem);
  } catch {}
}

function updateMemoryUI(mem) {
  const list = document.getElementById("memory-list");
  const items = [];
  if (mem.user_name) items.push(`👤 ${mem.user_name}`);
  if (mem.first_met) items.push(`📅 First met: ${mem.first_met}`);
  if (mem.sessions)  items.push(`💬 Sessions: ${mem.sessions}`);
  for (const f of (mem.facts || []).slice(0, 8)) items.push(`• ${f}`);
  for (const d of (mem.special_dates || [])) items.push(`🎂 ${d}`);

  if (items.length === 0) {
    list.innerHTML = `<div class="memory-item" style="font-style:italic">Nothing yet...</div>`;
  } else {
    list.innerHTML = items.map(i =>
      `<div class="memory-item">${i}</div>`
    ).join("");
  }
}

function showLevelUp(rel) {
  const t = document.getElementById("levelup-toast");
  document.getElementById("lu-emoji").textContent = rel.emoji;
  document.getElementById("lu-title").textContent = `Now: ${rel.name}!`;
  document.getElementById("lu-sub").textContent = "Your relationship with Mia grew 🥰";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function playAudio(b64) {
  const audio = new Audio("data:audio/mp3;base64," + b64);
  audio.play().catch(() => {});
}

// ── Speech Recognition ──
function setupSpeech() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = "en-US";

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById("msg-input").value = text;
    sendMessage();
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById("mic-btn").classList.remove("listening");
  };
}

// ── Events ──
document.getElementById("send-btn").onclick = sendMessage;

document.getElementById("msg-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById("msg-input").addEventListener("input", function() {
  this.style.height = "22px";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

document.getElementById("voice-toggle").onclick = function() {
  voiceEnabled = !voiceEnabled;
  this.classList.toggle("active", voiceEnabled);
  showToast(voiceEnabled ? "🔊 Voice on" : "🔇 Voice off");
};

document.getElementById("clear-btn").onclick = async () => {
  await fetch(`${API}/clear_history`, {method: "POST"});
  document.getElementById("messages").innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-emoji">💕</div>
      <h2>Chat cleared!</h2>
      <p>Start a new conversation with Mia</p>
    </div>
    <div class="msg-row typing-row" id="typing-row">
      <div class="msg-avatar mia">💕</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  showToast("Chat cleared!");
};

document.getElementById("mic-btn").onclick = () => {
  if (!recognition) { showToast("🎤 Speech not supported in this browser"); return; }
  if (isListening) {
    recognition.stop(); return;
  }
  isListening = true;
  document.getElementById("mic-btn").classList.add("listening");
  recognition.start();
  showToast("🎤 Listening...");
};

setupSpeech();
init();
</script>
</body>
</html>
